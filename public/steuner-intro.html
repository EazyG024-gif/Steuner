<html lang="nl">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080610; }
    #root { width: 100%; height: 100%; position: absolute; inset: 0; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">// animations.jsx
// Reusable animation starter: Stage, Timeline, Sprite, easing helpers.
// Usage (in an HTML file that loads React + Babel):
//
//   <Stage width={1280} height={720} duration={10} background="#f6f4ef">
//     <MyScene />
//   </Stage>
//
// Inside <Stage>, any child can call useTime() to read the current
// playhead (seconds). Or wrap content in <Sprite start={1} end={4}>...</Sprite>
// to only render during that window -- children receive a `localTime` and
// `progress` via the useSprite() hook.
//
// ─────────────────────────────────────────────────────────────────────────────

// ── Easing functions (hand-rolled, Popmotion-style) ─────────────────────────
// All easings take t ∈ [0,1] and return eased t ∈ [0,1] (may overshoot for back/elastic).
const Easing = {
  linear: (t) => t,

  // Quad
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),

  // Cubic
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),

  // Quart
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),

  // Expo
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0;
    if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },

  // Sine
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,

  // Back (overshoot)
  easeOutBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  },
  easeInBack: (t) => {
    const c1 = 1.70158, c3 = c1 + 1;
    return c3 * t * t * t - c1 * t * t;
  },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },

  // Elastic
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0;
    if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

// ── Core interpolation helpers ──────────────────────────────────────────────

// Clamp a value to [min, max]
const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// interpolate([0, 0.5, 1], [0, 100, 50], ease?) -> fn(t)
// Popmotion-style: linearly maps t across input keyframes to output values,
// with optional easing per segment (single fn or array of fns).
function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        const eased = easeFn(local);
        return output[i] + (output[i + 1] - output[i]) * eased;
      }
    }
    return output[output.length - 1];
  };
}

// animate({from, to, start, end, ease})(t) — simpler single-segment tween.
// Returns `from` before `start`, `to` after `end`.
function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    const local = (t - start) / (end - start);
    return from + (to - from) * ease(local);
  };
}

// ── Timeline context ────────────────────────────────────────────────────────

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });

const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

// ── Sprite ──────────────────────────────────────────────────────────────────
// Renders children only when the playhead is inside [start, end]. Provides
// a sub-context with `localTime` (seconds since start) and `progress` (0..1).
//
//   <Sprite start={2} end={5}>
//     {({ localTime, progress }) => <Thing x={progress * 100} />}
//   </Sprite>
//
// Or as a plain wrapper — children can call useSprite() themselves.

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;

  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration)
    ? clamp(localTime / duration, 0, 1)
    : 0;

  const value = { localTime, progress, duration, visible };

  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

// ── Sample sprite components ────────────────────────────────────────────────

// TextSprite: fades/slides text in on entry, holds, then fades out on exit.
// Props: text, x, y, size, color, font, entryDur, exitDur, align
function TextSprite({
  text,
  x = 0, y = 0,
  size = 48,
  color = '#111',
  font = 'Inter, system-ui, sans-serif',
  weight = 600,
  entryDur = 0.45,
  exitDur = 0.35,
  entryEase = Easing.easeOutBack,
  exitEase = Easing.easeInCubic,
  align = 'left',
  letterSpacing = '-0.01em',
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let ty = 0;

  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    ty = -t * 8;
  }

  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`,
      opacity,
      fontFamily: font,
      fontSize: size,
      fontWeight: weight,
      color,
      letterSpacing,
      whiteSpace: 'pre',
      lineHeight: 1.1,
      willChange: 'transform, opacity',
    }}>
      {text}
    </div>
  );
}

// ImageSprite: scales + fades in; optional Ken Burns drift during hold.
function ImageSprite({
  src,
  x = 0, y = 0,
  width = 400, height = 300,
  entryDur = 0.6,
  exitDur = 0.4,
  kenBurns = false,
  kenBurnsScale = 1.08,
  radius = 12,
  fit = 'cover',
  placeholder = null, // {label: string} for striped placeholder
}) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutCubic(clamp(localTime / entryDur, 0, 1));
    opacity = t;
    scale = 0.96 + 0.04 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInCubic(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = (kenBurns ? kenBurnsScale : 1) + 0.02 * t;
  } else if (kenBurns) {
    const holdSpan = exitStart - entryDur;
    const holdT = holdSpan > 0 ? (localTime - entryDur) / holdSpan : 0;
    scale = 1 + (kenBurnsScale - 1) * holdT;
  }

  const content = placeholder ? (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'repeating-linear-gradient(135deg, #e9e6df 0 10px, #dcd8cf 10px 20px)',
      color: '#6b6458',
      fontFamily: 'JetBrains Mono, ui-monospace, monospace',
      fontSize: 13,
      letterSpacing: '0.04em',
      textTransform: 'uppercase',
    }}>
      {placeholder.label || 'image'}
    </div>
  ) : (
    <img src={src} alt="" style={{ width: '100%', height: '100%', objectFit: fit, display: 'block' }} />
  );

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      borderRadius: radius,
      overflow: 'hidden',
      willChange: 'transform, opacity',
    }}>
      {content}
    </div>
  );
}

// RectSprite: simple rectangle that animates position/size/color via props.
// Useful demo primitive — takes a `render` fn for per-frame customization.
function RectSprite({
  x = 0, y = 0,
  width = 100, height = 100,
  color = '#111',
  radius = 8,
  entryDur = 0.4,
  exitDur = 0.3,
  render, // optional: (ctx) => style overrides
}) {
  const spriteCtx = useSprite();
  const { localTime, duration } = spriteCtx;
  const exitStart = Math.max(0, duration - exitDur);

  let opacity = 1;
  let scale = 1;

  if (localTime < entryDur) {
    const t = Easing.easeOutBack(clamp(localTime / entryDur, 0, 1));
    opacity = clamp(localTime / entryDur, 0, 1);
    scale = 0.4 + 0.6 * t;
  } else if (localTime > exitStart) {
    const t = Easing.easeInQuad(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t;
    scale = 1 - 0.15 * t;
  }

  const overrides = render ? render(spriteCtx) : {};

  return (
    <div style={{
      position: 'absolute',
      left: x, top: y,
      width, height,
      background: color,
      borderRadius: radius,
      opacity,
      transform: `scale(${scale})`,
      transformOrigin: 'center',
      willChange: 'transform, opacity',
      ...overrides,
    }} />
  );
}


function Stage({
  width = 1280,
  height = 720,
  duration = 10,
  background = '#f6f4ef',
  fps = 60,
  loop = true,
  autoplay = true,
  persistKey = 'animstage',
  children,
}) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);

  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  // Persist playhead
  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  // Auto-scale to fit viewport
  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44; // playback bar height
      const s = Math.min(
        el.clientWidth / width,
        (el.clientHeight - barH) / height
      );
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => {
      ro.disconnect();
      window.removeEventListener('resize', measure);
    };
  }, [width, height]);

  // Animation loop
  React.useEffect(() => {
    if (!playing) {
      lastTsRef.current = null;
      return;
    }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      lastTsRef.current = null;
    };
  }, [playing, duration, loop]);

  // Keyboard: space = play/pause, ← → = seek
  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(p => !p);
      } else if (e.code === 'ArrowLeft') {
        setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.code === 'ArrowRight') {
        setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      } else if (e.key === '0' || e.code === 'Home') {
        setTime(0);
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;

  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div
      ref={stageRef}
      style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        background: '#0a0a0a',
        fontFamily: 'Inter, system-ui, sans-serif',
      }}
    >
      {/* Canvas area — vertically centered in remaining space */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        minHeight: 0,
      }}>
        <div
          ref={canvasRef}
          style={{
            width, height,
            background,
            position: 'relative',
            transform: `scale(${scale})`,
            transformOrigin: 'center',
            flexShrink: 0,
            boxShadow: '0 20px 60px rgba(0,0,0,0.4)',
            overflow: 'hidden',
          }}
        >
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>

      {/* Playback bar — stacked below canvas, never overlapping */}
      <PlaybackBar
        time={displayTime}
        actualTime={time}
        duration={duration}
        playing={playing}
        onPlayPause={() => setPlaying(p => !p)}
        onReset={() => { setTime(0); }}
        onSeek={(t) => setTime(t)}
        onHover={(t) => setHoverTime(t)}
      />
    </div>
  );
}

// ── Playback bar ────────────────────────────────────────────────────────────
// Play/pause, return-to-begin, scrub track, time display.
// Uses fixed-width time fields so layout doesn't thrash.

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    const x = clamp((e.clientX - rect.left) / rect.width, 0, 1);
    return x * duration;
  }, [duration]);

  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) {
      onSeek(t);
    } else {
      onHover(t);
    }
  };

  const onTrackLeave = () => {
    if (!dragging) onHover(null);
  };

  const onTrackDown = (e) => {
    setDragging(true);
    const t = timeFromEvent(e);
    onSeek(t);
    onHover(null);
  };

  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => {
      if (!trackRef.current) return;
      const t = timeFromEvent(e);
      onSeek(t);
    };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('mousemove', onMove);
    };
  }, [dragging, timeFromEvent, onSeek]);

  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60);
    const s = Math.floor(total % 60);
    const cs = Math.floor((total * 100) % 100);
    return `${String(m).padStart(1, '0')}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
  };

  const mono = 'JetBrains Mono, ui-monospace, SFMono-Regular, monospace';

  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)',
      borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%',
      maxWidth: 680,
      alignSelf: 'center',

      borderRadius: 8,
      color: '#f6f4ef',
      fontFamily: 'Inter, system-ui, sans-serif',
      userSelect: 'none',
      flexShrink: 0,
    }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>

      {/* Current time: fixed width so it doesn't thrash */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right',
        color: '#f6f4ef',
      }}>
        {fmt(time)}
      </div>

      {/* Scrub track */}
      <div
        ref={trackRef}
        onMouseMove={onTrackMove}
        onMouseLeave={onTrackLeave}
        onMouseDown={onTrackDown}
        style={{
          flex: 1,
          height: 22,
          position: 'relative',
          cursor: 'pointer',
          display: 'flex', alignItems: 'center',
        }}
      >
        <div style={{
          position: 'absolute',
          left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)',
          borderRadius: 2,
        }}/>
        <div style={{
          position: 'absolute',
          left: `${pct}%`, top: '50%',
          width: 12, height: 12,
          marginLeft: -6, marginTop: -6,
          background: '#fff',
          borderRadius: 6,
          boxShadow: '0 2px 4px rgba(0,0,0,0.4)',
        }}/>
      </div>

      {/* Duration: fixed width */}
      <div style={{
        fontFamily: mono,
        fontSize: 12,
        fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left',
        color: 'rgba(246,244,239,0.55)',
      }}>
        {fmt(duration)}
      </div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button
      onClick={onClick}
      title={title}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: 28, height: 28,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)',
        borderRadius: 6,
        color: '#f6f4ef',
        cursor: 'pointer',
        padding: 0,
        transition: 'background 120ms',
      }}
    >
      {children}
    </button>
  );
}


Object.assign(window, {
  Easing, interpolate, animate, clamp,
  TimelineContext, useTime, useTimeline,
  Sprite, SpriteContext, useSprite,
  TextSprite, ImageSprite, RectSprite,
  Stage, PlaybackBar,
});</script>
</head>
<body>
  <div id="root"></div>

  /* ── Palette ─────────────────────────────────────────────────────── */
  const V = '#7C3AED';
  const VL = '#A78BFA';
  const VP = '#EDE9FE';
  const VD = '#4C1D95';
  const BG = '#0D0A1E';
  const WH = '#FAFBFF';
  const TX = '#1E1B4B';
  const MU = '#9CA3AF';
  const GR = '#10B981';

  /* ── SceneFade ───────────────────────────────────────────────────── */
  function SceneFade({ start, end, fadeDur = 0.5, children }) {
    const t = useTime();
    if (t < start - 0.01 || t > end + 0.01) return null;
    const inP  = clamp((t - start) / fadeDur, 0, 1);
    const outP = clamp((t - (end - fadeDur)) / fadeDur, 0, 1);
    const op   = Math.min(Easing.easeInOutCubic(inP), 1 - Easing.easeInOutCubic(outP));
    if (op <= 0) return null;
    return (
      <div style={{ position: 'absolute', inset: 0, opacity: op }}>
        {children}
      </div>
    );
  }

  /* ── Stars background ─────────────────────────────────────────────── */
  const STAR_DATA = Array.from({ length: 40 }, (_, i) => ({
    x: (i * 73 + 13) % 100,
    y: (i * 47 + 29) % 100,
    s: i % 4 === 0 ? 2 : 1,
    o: 0.2 + (i % 7) * 0.08,
  }));
  function Stars() {
    return (
      <>
        {STAR_DATA.map((s, i) => (
          <div key={i} style={{
            position: 'absolute',
            left: `${s.x}%`, top: `${s.y}%`,
            width: s.s, height: s.s, borderRadius: '50%',
            background: 'rgba(167,139,250,0.8)',
            opacity: s.o,
          }} />
        ))}
      </>
    );
  }

  /* ── Phone frame ──────────────────────────────────────────────────── */
  function PhoneFrame({ children, glow = true }) {
    return (
      <div style={{
        width: 280, height: 560,
        background: '#18122e',
        borderRadius: 46,
        boxShadow: glow
          ? `0 0 0 8px #221840, 0 50px 120px rgba(124,58,237,0.45), 0 20px 50px rgba(0,0,0,0.6)`
          : `0 0 0 8px #2a2540, 0 24px 60px rgba(0,0,0,0.35)`,
        overflow: 'hidden',
        position: 'relative',
        flexShrink: 0,
      }}>
        {/* Dynamic island */}
        <div style={{
          position: 'absolute', top: 13, left: '50%',
          transform: 'translateX(-50%)',
          width: 96, height: 26,
          background: '#09060f', borderRadius: 13, zIndex: 10,
        }} />
        {/* Status bar */}
        <div style={{
          position: 'absolute', top: 18, left: 22, right: 22,
          display: 'flex', justifyContent: 'space-between',
          alignItems: 'center',
          fontSize: 11, fontWeight: 600,
          color: 'rgba(255,255,255,0.85)', zIndex: 9,
          fontFamily: 'DM Sans, sans-serif',
        }}>
          <span>9:41</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
              <rect x="0" y="5" width="2.5" height="6" rx="0.8" fill="white"/>
              <rect x="4" y="3.5" width="2.5" height="7.5" rx="0.8" fill="white"/>
              <rect x="8" y="1.5" width="2.5" height="9.5" rx="0.8" fill="white"/>
              <rect x="12" y="0" width="2.5" height="11" rx="0.8" fill="white" opacity="0.4"/>
            </svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
              <rect x="0.5" y="0.5" width="12" height="9" rx="2" stroke="white" strokeWidth="1.1" fill="none"/>
              <rect x="13" y="3" width="2" height="4" rx="1" fill="white" opacity="0.5"/>
              <rect x="2" y="2.5" width="7.5" height="5.5" rx="0.8" fill="white"/>
            </svg>
          </span>
        </div>
        {/* Screen (starts below notch area) */}
        <div style={{ position: 'absolute', top: 52, left: 0, right: 0, bottom: 0, overflow: 'hidden' }}>
          {children}
        </div>
        {/* Home bar */}
        <div style={{
          position: 'absolute', bottom: 7, left: '50%',
          transform: 'translateX(-50%)',
          width: 110, height: 4,
          background: 'rgba(255,255,255,0.28)', borderRadius: 2, zIndex: 10,
        }} />
      </div>
    );
  }

  /* ── SCENE 1 : Hook  0–5s ─────────────────────────────────────────── */
  function Scene1() {
    const t = useTime();

    const phoneP  = clamp(t / 0.7, 0, 1);
    const phoneS  = 0.82 + 0.18 * Easing.easeOutBack(phoneP);
    const score   = interpolate([0, 4.5], [5.0, 8.0], Easing.easeInOutCubic)(t);
    const reveal  = clamp((t - 0.6) / 3.2, 0, 1);
    const textP   = clamp((t - 2.2) / 0.9, 0, 1);

    const W = 228, H = 108;
    const scores  = [5.0, 5.6, 6.1, 6.7, 7.2, 7.7, 8.0];
    const days    = ['Ma','Di','Wo','Do','Vr','Za','Zo'];
    const dx = (i) => (i / 6) * W;
    const dy = (s) => H - ((s - 4.5) / 4.5) * H;
    const pts = scores.map((s, i) => `${dx(i).toFixed(1)},${dy(s).toFixed(1)}`).join(' ');

    return (
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse 70% 60% at 65% 45%, #1d1045 0%, #0D0A1E 70%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
      }}>
        <Stars />
        {/* Ambient glow */}
        <div style={{
          position: 'absolute', left: '50%', top: '50%',
          width: 600, height: 600,
          transform: 'translate(-50%, -50%)',
          borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%)',
          pointerEvents: 'none',
        }} />

        <div style={{
          transform: `scale(${phoneS})`, opacity: phoneP,
          willChange: 'transform, opacity',
        }}>
          <PhoneFrame>
            <div style={{ padding: '14px 18px', background: WH, height: '100%', fontFamily: 'DM Sans, sans-serif' }}>
              {/* Header */}
              <div style={{ fontSize: 12, fontWeight: 600, color: V, marginBottom: 2 }}>Stemming</div>
              <div style={{ fontSize: 10, color: MU, marginBottom: 14 }}>afgelopen 7 dagen</div>

              {/* Score */}
              <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginBottom: 18 }}>
                <span style={{ fontSize: 50, fontWeight: 700, color: TX, lineHeight: 1, fontVariantNumeric: 'tabular-nums' }}>
                  {score.toFixed(1)}
                </span>
                <span style={{ fontSize: 16, color: MU, fontWeight: 400 }}>/10</span>
                <span style={{
                  fontSize: 12, color: GR, fontWeight: 600,
                  marginLeft: 6, opacity: clamp((t - 1.2) / 0.5, 0, 1),
                }}>↑ +3.0</span>
              </div>

              {/* Chart */}
              <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible', display: 'block' }}>
                <defs>
                  <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={V} stopOpacity="0.18"/>
                    <stop offset="100%" stopColor={V} stopOpacity="0"/>
                  </linearGradient>
                  <clipPath id="rc1">
                    <rect x={0} y={-10} width={W * reveal} height={H + 20}/>
                  </clipPath>
                </defs>
                {[0.3, 0.55, 0.8].map((f, i) => (
                  <line key={i} x1={0} y1={H * f} x2={W} y2={H * f}
                    stroke="#E5E7EB" strokeWidth={0.6} strokeDasharray="3 5"/>
                ))}
                <polygon points={`0,${H} ${pts} ${W},${H}`} fill="url(#g1)" clipPath="url(#rc1)"/>
                <polyline points={pts} fill="none" stroke={V} strokeWidth={2.5}
                  strokeLinecap="round" strokeLinejoin="round" clipPath="url(#rc1)"/>
                {scores.map((s, i) => {
                  const px = dx(i), py = dy(s);
                  const visible = reveal * W > px - 5;
                  return visible ? (
                    <g key={i}>
                      <circle cx={px} cy={py} r={4} fill={V}/>
                      <circle cx={px} cy={py} r={1.8} fill="white"/>
                    </g>
                  ) : null;
                })}
              </svg>

              {/* Day labels */}
              <div style={{
                display: 'flex', justifyContent: 'space-between',
                marginTop: 5, fontSize: 9, color: MU,
              }}>
                {days.map(d => <span key={d}>{d}</span>)}
              </div>

              {/* Callout */}
              <div style={{
                marginTop: 14,
                background: VP,
                borderRadius: 10, padding: '10px 12px',
                opacity: clamp((t - 1.8) / 0.7, 0, 1),
                borderLeft: `3px solid ${V}`,
              }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: V, marginBottom: 2 }}>Beste week tot nu toe</div>
                <div style={{ fontSize: 10, color: '#6B7280' }}>Stemming steeg met 3 punten ↑</div>
              </div>
            </div>
          </PhoneFrame>
        </div>

        {/* Hero text */}
        <div style={{
          position: 'absolute', bottom: 108, left: 0, right: 0,
          textAlign: 'center', padding: '0 90px',
          opacity: textP,
          transform: `translateY(${(1 - Easing.easeOutCubic(textP)) * 18}px)`,
          willChange: 'transform, opacity',
        }}>
          <div style={{
            fontFamily: 'DM Sans, sans-serif',
            fontSize: 33, fontWeight: 600, color: WH,
            lineHeight: 1.3, textShadow: '0 2px 24px rgba(0,0,0,0.5)',
          }}>
            Wat als je wist wat jou{' '}
            <em style={{ fontStyle: 'italic', color: VL }}>écht</em>{' '}
            gelukkig maakt?
          </div>
        </div>
      </div>
    );
  }

  /* ── SCENE 2 : Problem  5–15s ─────────────────────────────────────── */
  const NOTIFS = [
    { icon: '💬', app: 'WhatsApp',   text: '47 nieuwe berichten',        d: 0.2 },
    { icon: '📧', app: 'Mail',       text: 'Re: Spoedvergadering 15:00', d: 1.0 },
    { icon: '📅', app: 'Agenda',     text: 'Meeting over 10 minuten',    d: 1.8 },
    { icon: '💼', app: 'Slack',      text: 'Heb je de rapportage af?',   d: 2.7 },
    { icon: '🔔', app: 'Herinnering','text': 'Deadline vandaag 17:00',   d: 3.5 },
    { icon: '📱', app: 'Teams',      text: 'Je bent gemist in de call',  d: 4.2 },
  ];

  function Scene2() {
    const t  = useTime();
    const lt = t - 5;

    // Clock hands
    const secAngle = lt * 60;
    const minAngle = lt * 10;
    const cx = 640, cy = 200, cr = 60;

    const textP = clamp((lt - 6.0) / 1.0, 0, 1);

    return (
      <div style={{
        position: 'absolute', inset: 0,
        background: '#070511',
        overflow: 'hidden',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        {/* Background radial */}
        <div style={{
          position: 'absolute', inset: 0,
          background: 'radial-gradient(ellipse 80% 60% at 50% 50%, rgba(124,58,237,0.07) 0%, transparent 60%)',
        }} />

        {/* Fast clock (top center) */}
        <div style={{
          position: 'absolute', top: 80, left: '50%',
          transform: 'translateX(-50%)',
          opacity: clamp(lt / 0.5, 0, 0.5),
        }}>
          <svg width={120} height={120} viewBox="0 0 120 120">
            <circle cx={60} cy={60} r={55} fill="none" stroke="rgba(124,58,237,0.2)" strokeWidth={1.5}/>
            {/* tick marks */}
            {Array.from({length: 12}, (_, i) => {
              const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
              return (
                <line key={i}
                  x1={60 + Math.cos(a) * 46} y1={60 + Math.sin(a) * 46}
                  x2={60 + Math.cos(a) * 52} y2={60 + Math.sin(a) * 52}
                  stroke="rgba(167,139,250,0.4)" strokeWidth={1.5}/>
              );
            })}
            {/* minute hand */}
            <line
              x1={60} y1={60}
              x2={60 + Math.cos((minAngle - 90) * Math.PI / 180) * 36}
              y2={60 + Math.sin((minAngle - 90) * Math.PI / 180) * 36}
              stroke="rgba(167,139,250,0.6)" strokeWidth={2} strokeLinecap="round"/>
            {/* second hand */}
            <line
              x1={60} y1={60}
              x2={60 + Math.cos((secAngle - 90) * Math.PI / 180) * 44}
              y2={60 + Math.sin((secAngle - 90) * Math.PI / 180) * 44}
              stroke={V} strokeWidth={1.5} strokeLinecap="round"/>
            <circle cx={60} cy={60} r={3} fill={V}/>
          </svg>
        </div>

        {/* Notification stack */}
        <div style={{
          position: 'absolute',
          top: '50%', left: '50%',
          transform: 'translate(-50%, -48%)',
          width: 380,
          display: 'flex', flexDirection: 'column', gap: 8,
        }}>
          {NOTIFS.map((n, i) => {
            const appear = clamp((lt - n.d) / 0.45, 0, 1);
            if (appear <= 0) return null;
            // After appearing, slowly drift up
            const age = Math.max(0, lt - n.d - 0.5);
            const drift = age * 6;
            const fade  = Math.max(0, 1 - drift / 90);
            return (
              <div key={i} style={{
                display: 'flex', alignItems: 'center', gap: 12,
                background: 'rgba(255,255,255,0.055)',
                backdropFilter: 'blur(12px)',
                border: '1px solid rgba(255,255,255,0.09)',
                borderRadius: 14,
                padding: '11px 16px',
                opacity: appear * fade,
                transform: `translateY(${-drift * 0.4}px) translateX(${(1 - Easing.easeOutCubic(appear)) * 44}px)`,
                willChange: 'transform, opacity',
              }}>
                <span style={{ fontSize: 22, flexShrink: 0 }}>{n.icon}</span>
                <div>
                  <div style={{ fontSize: 9, color: 'rgba(255,255,255,0.38)', fontFamily: 'DM Sans, sans-serif', fontWeight: 500, marginBottom: 2 }}>
                    {n.app}
                  </div>
                  <div style={{ fontSize: 13, color: 'rgba(255,255,255,0.88)', fontFamily: 'DM Sans, sans-serif', fontWeight: 500 }}>
                    {n.text}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Bottom question */}
        <div style={{
          position: 'absolute', bottom: 108, left: 0, right: 0,
          textAlign: 'center', padding: '0 100px',
          opacity: textP,
          transform: `translateY(${(1 - Easing.easeOutCubic(textP)) * 18}px)`,
          willChange: 'transform, opacity',
        }}>
          <div style={{ fontFamily: 'DM Sans, sans-serif', marginBottom: 6 }}>
            <span style={{ fontSize: 24, color: 'rgba(255,255,255,0.55)', fontWeight: 300 }}>
              Elke dag druk.
            </span>
          </div>
          <div style={{ fontFamily: 'DM Sans, sans-serif' }}>
            <span style={{ fontSize: 34, color: WH, fontWeight: 600, lineHeight: 1.25 }}>
              Maar hoe gaat het{' '}
              <em style={{ fontStyle: 'italic', color: VL }}>écht</em>{' '}
              met je?
            </span>
          </div>
        </div>
      </div>
    );
  }

  /* ── SCENE 3 : Demo  15–35s ───────────────────────────────────────── */

  function AppHeader({ title, sub }) {
    return (
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: TX }}>{title}</div>
        <div style={{ fontSize: 10, color: MU, marginTop: 2 }}>{sub}</div>
      </div>
    );
  }

  function DemoA({ lt }) {
    const sliders = [
      { label: 'Energie',  color: '#F59E0B', val: 0.73 },
      { label: 'Stemming', color: V,         val: 0.80 },
      { label: 'Slaap',    color: '#3B82F6', val: 0.58 },
      { label: 'Focus',    color: GR,        val: 0.67 },

    return (
      <div style={{ padding: '14px 18px', background: WH, height: '100%', fontFamily: 'DM Sans, sans-serif' }}>
        <AppHeader title="Hoe gaat het vandaag?" sub="Vrijdag 25 april · 08:32"/>
        {sliders.map((s, i) => {
          const delay = i * 0.45 + 0.2;
          const p = Easing.easeOutCubic(clamp((lt - delay) / 0.7, 0, 1));
          const val = p * s.val;
          return (
            <div key={s.label} style={{ marginBottom: 15, opacity: p > 0 ? 1 : 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 11, color: '#6B7280', fontWeight: 500 }}>{s.label}</span>

              </div>

                <div style={{ position: 'absolute', left: 0, width: `${val * 100}%`, height: '100%', borderRadius: 4, background: s.color }}/>
                <div style={{
                  position: 'absolute', left: `${val * 100}%`, top: '50%',

        <div style={{
          marginTop: 12,

  function DemoB({ lt }) {
    const pillars = [
      { label: 'Bewegen', score: 7.2, color: GR,       icon: '🏃' },
      { label: 'Voeding', score: 6.8, color: '#F59E0B', icon: '🥗' },
      { label: 'Slaap',   score: 5.9, color: '#3B82F6', icon: '😴' },

    const habits = [
      { label: '20 min bewegen',       done: true,  d: 0.2 },
      { label: 'Mediteren (10 min)',    done: true,  d: 0.8 },
      { label: 'Groenten gegeten',      done: true,  d: 1.4 },

      <div style={{ padding: '14px 18px', background: WH, height: '100%', fontFamily: 'DM Sans, sans-serif' }}>
        <AppHeader title="Gewoontes vandaag" sub="3 van 5 voltooid · 60%"/>
        {/* Progress bar */}
        <div style={{ height: 5, background: '#F3F4F6', borderRadius: 3, marginBottom: 14, overflow: 'hidden' }}>
          <div style={{
            width: `${Easing.easeOutCubic(clamp(lt / 1.5, 0, 1)) * 60}%`,
            height: '100%', background: GR, borderRadius: 3,
          }}/>
        </div>
        {habits.map((h, i) => {
          const appear = Easing.easeOutCubic(clamp((lt - h.d) / 0.4, 0, 1));
          const tick   = h.done ? clamp((lt - h.d - 0.15) / 0.35, 0, 1) : 0;
          return (
            <div key={h.label} style={{
              display: 'flex', alignItems: 'center', gap: 11,
              padding: '10px 0',

              transform: `translateX(${(1 - appear) * 16}px)`,
              willChange: 'transform, opacity',

              {/* Checkbox */}
              <div style={{
                width: 22, height: 22, borderRadius: 6, flexShrink: 0,
                background: h.done ? `rgba(16,185,129,${tick})` : 'transparent',
                border: `2px solid ${h.done ? GR : '#D1D5DB'}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                {h.done && tick > 0.4 && (
                  <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                    <path d="M1 4L3.8 7L9 1" stroke="white" strokeWidth="2.2"
                      strokeLinecap="round" strokeLinejoin="round"
                      strokeDasharray="13" strokeDashoffset={13 * (1 - tick)}/>
                  </svg>

              </div>
              <div style={{
                fontSize: 12, fontWeight: 500,
                color: h.done && tick > 0.7 ? GR : TX,
                textDecoration: h.done && tick > 0.85 ? 'line-through' : 'none',
                textDecorationColor: 'rgba(16,185,129,0.5)',
              }}>
                {h.label}
              </div>
            </div>
          );
        })}

    );

  function DemoD({ lt }) {
    const drivers = [
      { label: 'Beweging',       pct: 82, color: GR },
      { label: 'Slaapkwaliteit', pct: 71, color: '#3B82F6' },
      { label: 'Sociaal contact', pct: 65, color: '#EC4899' },
      { label: 'Natuur',         pct: 58, color: '#10B981' },
      { label: 'Werkdruk',       pct: 44, color: '#F59E0B' },
    ];
    return (
      <div style={{ padding: '14px 18px', background: WH, height: '100%', fontFamily: 'DM Sans, sans-serif' }}>
        <AppHeader title="Wat drijft jouw stemming?" sub="Correlatie met jouw score"/>
        {drivers.map((d, i) => {
          const delay = i * 0.28 + 0.15;
          const appear = clamp((lt - delay + 0.15) / 0.4, 0, 1);
          const barW   = Easing.easeOutCubic(clamp((lt - delay) / 0.6, 0, 1)) * (d.pct / 100);
          return (
            <div key={d.label} style={{ marginBottom: 12, opacity: appear }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
                <span style={{ fontSize: 11, color: '#4B5563', fontWeight: 500 }}>{d.label}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: d.color }}>{Math.round(barW * 100)}%</span>
              </div>
              <div style={{ height: 9, background: '#F3F4F6', borderRadius: 5, overflow: 'hidden' }}>
                <div style={{
                  width: `${barW * 100}%`, height: '100%', borderRadius: 5,
                  background: `linear-gradient(90deg, ${d.color}80, ${d.color})`,
                }}/>
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  const CAPTIONS = [
    { text: 'Doe dagelijks je check-in in minder dan een minuut.',   s: 0.5,  e: 6.8 },
    { text: 'Bekijk je welzijnspijlers in één oogopslag.',            s: 7.5,  e: 13.5 },
    { text: 'Vink gewoontes af en bouw aan betere dagen.',            s: 14.0, e: 17.5 },
    { text: 'Ontdek wat jouw stemming écht beïnvloedt.',             s: 18.0, e: 20.0 },
  ];

  function Scene3() {
    const t  = useTime();
    const lt = t - 15; // 0–20

    // Sub-screen opacities with crossfade
    const opA = clamp(lt / 0.6, 0, 1) * (1 - clamp((lt - 7.0) / 0.8, 0, 1));
    const opB = clamp((lt - 6.5) / 0.8, 0, 1) * (1 - clamp((lt - 13.5) / 0.8, 0, 1));
    const opC = clamp((lt - 13.0) / 0.8, 0, 1) * (1 - clamp((lt - 17.5) / 0.8, 0, 1));
    const opD = clamp((lt - 17.0) / 0.8, 0, 1);

    const ltA = lt;
    const ltB = lt - 6.5;
    const ltC = lt - 13.0;
    const ltD = lt - 17.0;

    // Caption
    const cap = CAPTIONS.find(c => lt >= c.s && lt <= c.e);
    const capP = cap
      ? clamp((lt - cap.s) / 0.45, 0, 1) * (1 - clamp((lt - (cap.e - 0.45)) / 0.45, 0, 1))
      : 0;

    return (
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(140deg, #EDE9FE 0%, #E0F2FE 100%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
      }}>
        {/* Soft bg blobs */}
        <div style={{
          position: 'absolute', inset: 0,
          background: 'radial-gradient(ellipse 50% 50% at 20% 80%, rgba(124,58,237,0.09) 0%, transparent 50%), radial-gradient(ellipse 40% 40% at 80% 20%, rgba(59,130,246,0.07) 0%, transparent 50%)',
        }}/>

        {/* Phone */}
        <PhoneFrame glow={false}>
          {opA > 0.01 && <div style={{ position: 'absolute', inset: 0, opacity: opA }}><DemoA lt={ltA}/></div>}
          {opB > 0.01 && <div style={{ position: 'absolute', inset: 0, opacity: opB }}><DemoB lt={ltB}/></div>}
          {opC > 0.01 && <div style={{ position: 'absolute', inset: 0, opacity: opC }}><DemoC lt={ltC}/></div>}
          {opD > 0.01 && <div style={{ position: 'absolute', inset: 0, opacity: opD }}><DemoD lt={ltD}/></div>}
        </PhoneFrame>

        {/* Caption */}
        {cap && (
          <div style={{
            position: 'absolute', bottom: 78,
            left: 0, right: 0, textAlign: 'center',
            padding: '0 140px',
            opacity: capP,
            transform: `translateY(${(1 - Easing.easeOutCubic(capP)) * 10}px)`,
            willChange: 'transform, opacity',
          }}>
            <span style={{
              display: 'inline-block',
              background: 'rgba(13,10,30,0.72)',
              backdropFilter: 'blur(10px)',
              borderRadius: 10, padding: '9px 20px',
              fontSize: 17, color: 'rgba(255,255,255,0.92)',
              fontFamily: 'DM Sans, sans-serif', fontWeight: 400, lineHeight: 1.45,
            }}>
              {cap.text}
            </span>
          </div>
        )}

        {/* Floating feature pills (left side) */}
        {[
          { label: 'Dagelijkse check-in', icon: '✦', d: 1 },
          { label: 'Welzijnspijlers',     icon: '◈', d: 3 },
          { label: 'Gewoontetracker',     icon: '◉', d: 5 },
        ].map((pill, i) => {
          const appear = clamp((lt - pill.d) / 0.6, 0, 0.75);
          return (
            <div key={i} style={{
              position: 'absolute',
              left: 120, top: `${28 + i * 14}%`,
              display: 'flex', alignItems: 'center', gap: 8,
              background: 'rgba(255,255,255,0.72)',
              backdropFilter: 'blur(8px)',
              border: '1px solid rgba(124,58,237,0.12)',
              borderRadius: 24, padding: '7px 14px',
              opacity: appear,
              transform: `translateX(${(1 - appear / 0.75) * -24}px)`,
              willChange: 'transform, opacity',
              boxShadow: '0 4px 16px rgba(0,0,0,0.06)',
            }}>
              <span style={{ color: V, fontSize: 13 }}>{pill.icon}</span>
              <span style={{ fontSize: 12, fontWeight: 500, color: TX, fontFamily: 'DM Sans, sans-serif' }}>
                {pill.label}
              </span>
            </div>
          );
        })}
      </div>
    );
  }

  /* ── SCENE 4 : Insight  35–50s ────────────────────────────────────── */
  function Scene4() {
    const t  = useTime();
    const lt = t - 35; // 0–15

    const phoneP  = clamp(lt / 0.75, 0, 1);
    const phoneS  = 0.82 + 0.18 * Easing.easeOutBack(phoneP);
    const lineRev = clamp((lt - 0.4) / 4.2, 0, 1);
    const text1P  = clamp((lt - 4.8) / 0.9, 0, 1);
    const text2P  = clamp((lt - 7.0) / 0.9, 0, 1);
    const cardY   = interpolate([7.5, 8.8], [50, 0], Easing.easeOutBack)(lt);
    const cardP   = clamp((lt - 7.5) / 0.7, 0, 1);

    const W = 228, H = 108;
    const wkScores = [5.2, 5.7, 6.2, 6.8, 7.3, 7.8];
    const wkLabels = ['Wk 12','Wk 13','Wk 14','Wk 15','Wk 16','Wk 17'];
    const dx = (i) => (i / (wkScores.length - 1)) * W;
    const dy = (s) => H - ((s - 4.5) / 4.5) * H;
    const pts = wkScores.map((s, i) => `${dx(i).toFixed(1)},${dy(s).toFixed(1)}`).join(' ');

    return (
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(ellipse 75% 65% at 35% 55%, #1d1045 0%, #0D0A1E 65%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        gap: 90,
        overflow: 'hidden',
      }}>
        <Stars />
        <div style={{
          position: 'absolute', inset: 0,
          background: 'radial-gradient(ellipse 50% 60% at 30% 50%, rgba(124,58,237,0.1) 0%, transparent 50%)',
        }}/>

        {/* Left text */}
        <div style={{ maxWidth: 420, flexShrink: 0 }}>
          <div style={{
            opacity: text1P,
            transform: `translateY(${(1 - Easing.easeOutCubic(text1P)) * 18}px)`,
            willChange: 'transform, opacity',
            marginBottom: 20,
          }}>
            <div style={{
              fontFamily: 'DM Sans, sans-serif',
              fontSize: 35, fontWeight: 700, color: WH, lineHeight: 1.22, marginBottom: 10,
            }}>
              Ontdek welke gewoontes{' '}
              <em style={{ fontStyle: 'normal', color: VL }}>écht</em>{' '}
              werken
            </div>
            <div style={{ fontFamily: 'DM Sans, sans-serif', fontSize: 20, color: 'rgba(255,255,255,0.55)', fontWeight: 300 }}>
              — voor jou.
            </div>
          </div>
          <div style={{
            opacity: text2P,
            transform: `translateY(${(1 - Easing.easeOutCubic(text2P)) * 12}px)`,
            willChange: 'transform, opacity',
          }}>
            <div style={{
              background: 'rgba(124,58,237,0.18)',
              border: '1px solid rgba(124,58,237,0.35)',
              borderRadius: 12, padding: '13px 18px',
              fontSize: 15, color: 'rgba(255,255,255,0.8)',
              fontFamily: 'DM Sans, sans-serif', fontWeight: 400, lineHeight: 1.5,
            }}>
              Persoonlijke inzichten.<br/>Geen generieke adviezen.
            </div>
          </div>
        </div>

        {/* Phone */}
        <div style={{
          transform: `scale(${phoneS})`, opacity: phoneP,
          willChange: 'transform, opacity', flexShrink: 0,
        }}>
          <PhoneFrame>
            <div style={{ padding: '14px 18px', background: WH, height: '100%', fontFamily: 'DM Sans, sans-serif', overflow: 'hidden' }}>
              <AppHeader title="Mijn ontwikkeling" sub="Stemming · 6 weken"/>

              {/* Chart */}
              <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible', display: 'block' }}>
                <defs>
                  <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stopColor={V} stopOpacity="0.22"/>
                    <stop offset="100%" stopColor={V} stopOpacity="0"/>
                  </linearGradient>
                  <clipPath id="rc4">
                    <rect x={0} y={-10} width={W * lineRev} height={H + 20}/>
                  </clipPath>
                </defs>
                {[0.3, 0.55, 0.8].map((f, i) => (
                  <line key={i} x1={0} y1={H * f} x2={W} y2={H * f}
                    stroke="#E5E7EB" strokeWidth={0.6} strokeDasharray="3 5"/>
                ))}
                <polygon points={`0,${H} ${pts} ${W},${H}`} fill="url(#g4)" clipPath="url(#rc4)"/>
                <polyline points={pts} fill="none" stroke={V} strokeWidth={2.5}
                  strokeLinecap="round" strokeLinejoin="round" clipPath="url(#rc4)"/>
                {wkScores.map((s, i) => {
                  const px = dx(i), py = dy(s);
                  return lineRev * W > px - 5 ? (
                    <g key={i}>
                      <circle cx={px} cy={py} r={3.5} fill={V}/>
                      <circle cx={px} cy={py} r={1.5} fill="white"/>
                    </g>
                  ) : null;
                })}
              </svg>

              {/* Week labels */}
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 5, marginBottom: 12, fontSize: 8, color: MU }}>
                {wkLabels.map(w => <span key={w}>{w}</span>)}
              </div>

              {/* Score badge */}
              <div style={{
                display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14,
                opacity: clamp((lt - 3.8) / 0.6, 0, 1),
              }}>
                <span style={{ fontSize: 28, fontWeight: 700, color: TX }}>7.8</span>
                <span style={{ fontSize: 11, color: GR, fontWeight: 600, background: '#ECFDF5', padding: '3px 9px', borderRadius: 6 }}>
                  ↑ +2.6 deze periode
                </span>
              </div>

              {/* Habit impact card */}
              <div style={{
                background: 'linear-gradient(135deg, #F5F3FF, #EDE9FE)',
                borderRadius: 12, padding: '12px 14px',
                border: '1px solid rgba(124,58,237,0.18)',
                transform: `translateY(${cardY}px)`,
                opacity: cardP,
                willChange: 'transform, opacity',
              }}>
                <div style={{ fontSize: 10, color: V, fontWeight: 700, marginBottom: 8 }}>
                  💡 Grootste impact
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <div>
                    <div style={{ fontSize: 12, fontWeight: 600, color: TX }}>Dagelijks bewegen</div>
                    <div style={{ fontSize: 10, color: MU, marginTop: 2 }}>Sterkste correlatie</div>
                  </div>
                  <div style={{
                    background: V, color: 'white', borderRadius: 8, padding: '5px 11px',
                    fontSize: 15, fontWeight: 800, letterSpacing: '-0.01em',
                    boxShadow: '0 4px 12px rgba(124,58,237,0.35)',
                  }}>+1.8</div>
                </div>
              </div>
            </div>
          </PhoneFrame>
        </div>
      </div>
    );
  }

  /* ── SCENE 5 : CTA  50–60s ────────────────────────────────────────── */
  function Scene5() {
    const t  = useTime();
    const lt = t - 50; // 0–10

    const logoP    = Easing.easeOutBack(clamp(lt / 0.7, 0, 1));
    const taglineP = clamp((lt - 1.3) / 0.9, 0, 1);
    const urlP     = clamp((lt - 2.6) / 0.7, 0, 1);
    const glowR    = 420 + Math.sin(lt * 1.1) * 25;

    return (
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
      }}>
        {/* Gradient bg */}
        <div style={{
          position: 'absolute', inset: 0,
          background: 'linear-gradient(135deg, #3b1a7e 0%, #6d28d9 35%, #7c3aed 55%, #4c1d95 80%, #1e1047 100%)',
        }}/>
        {/* Grid */}
        <div style={{
          position: 'absolute', inset: 0,
          backgroundImage: 'linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px)',
          backgroundSize: '72px 72px',
        }}/>
        {/* Glow orb */}
        <div style={{
          position: 'absolute', left: '50%', top: '50%',
          width: glowR, height: glowR,
          transform: 'translate(-50%, -50%)',
          borderRadius: '50%',
          background: 'radial-gradient(circle, rgba(196,181,253,0.22) 0%, transparent 68%)',
          pointerEvents: 'none',
          willChange: 'width, height',
        }}/>
        {/* Ring 1 */}
        <div style={{
          position: 'absolute', left: '50%', top: '50%',
          width: 520, height: 520,
          transform: 'translate(-50%, -50%)',
          borderRadius: '50%',
          border: '1px solid rgba(196,181,253,0.1)',
          opacity: clamp(lt / 2, 0, 1),
        }}/>
        {/* Ring 2 */}
        <div style={{
          position: 'absolute', left: '50%', top: '50%',
          width: 680, height: 680,
          transform: 'translate(-50%, -50%)',
          borderRadius: '50%',
          border: '1px solid rgba(196,181,253,0.055)',
          opacity: clamp(lt / 3, 0, 1),
        }}/>

        {/* Logo mark */}
        <div style={{
          transform: `scale(${logoP})`, opacity: logoP,
          marginBottom: 20, display: 'flex', flexDirection: 'column', alignItems: 'center',
          willChange: 'transform, opacity',
        }}>
          <div style={{
            width: 84, height: 84, borderRadius: 24,
            background: 'rgba(255,255,255,0.13)',
            backdropFilter: 'blur(12px)',
            border: '1.5px solid rgba(255,255,255,0.22)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            marginBottom: 18,
            boxShadow: '0 10px 40px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.12)',
          }}>
            <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
              {/* Stylized wellbeing wave / heartbeat-like mark */}
              <path d="M7 30 Q11 22 18 24 Q25 26 30 18 Q35 10 39 16"
                stroke="white" strokeWidth="3.5" strokeLinecap="round" fill="none"/>
              <circle cx="7" cy="30" r="3.5" fill="white"/>
              <circle cx="39" cy="16" r="3.5" fill="white"/>
              <path d="M10 36 Q15 28 22 30 Q29 32 34 24 Q38 18 42 22"
                stroke="rgba(255,255,255,0.35)" strokeWidth="2" strokeLinecap="round" fill="none"/>
            </svg>
          </div>
          <div style={{
            fontFamily: 'DM Sans, sans-serif',
            fontSize: 58, fontWeight: 700, color: 'white',
            letterSpacing: '-0.025em', lineHeight: 1,
          }}>
            Steuner
          </div>
        </div>

        {/* Tagline */}
        <div style={{
          opacity: taglineP,
          transform: `translateY(${(1 - Easing.easeOutCubic(taglineP)) * 14}px)`,
          textAlign: 'center', marginBottom: 32,
          willChange: 'transform, opacity',
        }}>
          <div style={{
            fontFamily: 'DM Sans, sans-serif',
            fontSize: 22, fontWeight: 300, color: 'rgba(255,255,255,0.82)',
            letterSpacing: '0.005em',
          }}>
            Jouw dagelijkse welzijnsbegeleider.
          </div>
        </div>

        {/* URL pill */}
        <div style={{
          opacity: urlP,
          transform: `translateY(${(1 - Easing.easeOutCubic(urlP)) * 10}px)`,
          willChange: 'transform, opacity',
        }}>
          <div style={{
            fontFamily: 'DM Sans, sans-serif',
            fontSize: 15, color: 'rgba(255,255,255,0.5)',
            letterSpacing: '0.1em', textTransform: 'uppercase', fontWeight: 500,
            background: 'rgba(255,255,255,0.08)',
            border: '1px solid rgba(255,255,255,0.14)',
            borderRadius: 9, padding: '9px 24px',
          }}>
            steuner.nl
          </div>
        </div>
      </div>
    );
  }

  /* ── Time label updater ───────────────────────────────────────────── */
  function TimeLabel() {
    const t = useTime();
    const sec = Math.floor(t);
    useEffect(() => {
      const el = document.getElementById('video-root');
      if (el) el.setAttribute('data-screen-label', `${sec}s`);
    }, [sec]);
    return null;
  }

  /* ── Root App ─────────────────────────────────────────────────────── */
  function App() {
    return (
      <div id="video-root" style={{ position: 'absolute', inset: 0 }}>
        <Stage
          width={1280} height={720} duration={60}
          background={BG} loop={false} autoplay={true}
          persistKey="steuner-v1"
        >
          <TimeLabel />

          <SceneFade start={0}    end={5.6}  fadeDur={0.5}><Scene1/></SceneFade>
          <SceneFade start={4.8}  end={15.6} fadeDur={0.6}><Scene2/></SceneFade>
          <SceneFade start={14.6} end={35.6} fadeDur={0.6}><Scene3/></SceneFade>
          <SceneFade start={34.6} end={50.6} fadeDur={0.6}><Scene4/></SceneFade>
          <SceneFade start={49.6} end={60}   fadeDur={0.7}><Scene5/></SceneFade>
        </Stage>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
